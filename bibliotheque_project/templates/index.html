<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>📚 Bibliothèque App</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: #0f0e17;
  color: white;
}

/* LOGIN */
#login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #1a1828;
  padding: 40px;
  border-radius: 20px;
  width: 320px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #7c6af7;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* APP */
#app {
  display: none;
  height: 100vh;
  display: flex;
}

.sidebar {
  width: 240px;
  background: #1a1828;
  padding: 20px;
}

.menu {
  margin-top: 20px;
}

.menu div {
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  border-radius: 8px;
}

.menu div:hover {
  background: #7c6af7;
}

.content {
  flex: 1;
  padding: 20px;
}

.card {
  background: #221f35;
  padding: 15px;
  margin: 10px;
  border-radius: 12px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
  gap: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>📚 Bibliothèque</h2>
    <input id="user" placeholder="username">
    <input id="pass" type="password" placeholder="password">
    <button onclick="login()">Se connecter</button>
    <p id="err"></p>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="sidebar">
    <h3>📚 Menu</h3>
    <div class="menu">
      <div onclick="show('home')">🏠 Accueil</div>
      <div onclick="show('books')">📖 Livres</div>
      <div onclick="show('authors')">✍️ Auteurs</div>
    </div>
  </div>

  <div class="content">

    <div id="home" class="page">
      <h2>Dashboard</h2>
      <div id="stats"></div>
    </div>

    <div id="books" class="page" style="display:none;">
      <h2>Livres</h2>
      <div id="booksList" class="grid"></div>
    </div>

    <div id="authors" class="page" style="display:none;">
      <h2>Auteurs</h2>
      <div id="authorsList" class="grid"></div>
    </div>

  </div>

</div>

<script>
const API = "http://127.0.0.1:8000/api";
let token = "";

async function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  const res = await fetch(API + "/token/", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({username:u, password:p})
  });

  if(!res.ok){
    document.getElementById("err").innerText = "❌ erreur login";
    return;
  }

  const data = await res.json();
  token = data.access;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "flex";

  loadData();
}

function show(page){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(page).style.display="block";
}

async function fetchAPI(url){
  const res = await fetch(API+"/"+url, {
    headers:{Authorization:"Bearer "+token}
  });
  return res.json();
}

async function loadData(){

  const books = await fetchAPI("livres");
  const authors = await fetchAPI("auteurs");

  document.getElementById("stats").innerHTML = `
    <div class="card">📖 Livres: ${books.length}</div>
    <div class="card">✍️ Auteurs: ${authors.length}</div>
  `;

  document.getElementById("booksList").innerHTML =
    books.map(b=>`
      <div class="card">
        <h4>${b.titre}</h4>
        <p>${b.annee_publication}</p>
      </div>
    `).join("");

  document.getElementById("authorsList").innerHTML =
    authors.map(a=>`
      <div class="card">
        <h4>${a.nom}</h4>
        <p>${a.nationalite || ""}</p>
      </div>
    `).join("");
}
</script>

</body>
</html>
